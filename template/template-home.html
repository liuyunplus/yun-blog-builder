<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" type="text/css" href="./style.css">
  </head>
  <body>
    <div class="site-header">
      <span class="site-header-left">
        <span class="site-title"><a href="{{ global.rootPath }}/index.html">我的博客</a></span>
      </span>
      <span class="site-header-right">
        <span class="site-home"><a href="{{ global.rootPath }}/index.html">首页</a></span>
        <span class="site-category">分类</span>
        <span class="site-archive">归档</span>
        <span class="site-about"><a href="{{ global.rootPath }}/about/index.html">关于</a></span>
      </span>
    </div>
    <div class="home-main">
      <div class="post-list">
        {{#each postList}}
          <div class="post-list-item">
            <div class="post-title">
              <a href="blog/{{ postMeta.title }}.html">{{ postMeta.title }}</a>
            </div>
            <div class="post-meta">
              发布日期: {{ postMeta.date }}
            </div>
            <div class="post-content">{{ postMeta.abstract }}...
              <a href="blog/{{ postMeta.title }}.html">阅读全文</a>
            </div>
            {{#if postMeta.cover}}
              <img src="{{ postMeta.cover }}" width="100%", height="250px", style="object-fit:cover"/>
            {{/if}}
          </div>
        {{/each}}
      </div>
    </div>
  </body>
</html>
